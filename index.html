<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Premium+</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: black;
  color: white;
  text-align: center;
}

/* OPENING SCREEN */
#opening {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.open-btn {
  padding: 15px 25px;
  background: gold;
  color: black;
  border: none;
  border-radius: 5px;
  font-size: 18px;
  cursor: pointer;
}

/* MAIN CONTENT */
#main {
  display: none;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.hero {
  padding: 80px 20px;
  background: linear-gradient(135deg, #1a1a1a, #000);
}

h1 {
  color: gold;
}

.section {
  padding: 40px 20px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  margin: 20px auto;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
}

.btn {
  background: gold;
  color: black;
  padding: 10px 20px;
  border-radius: 5px;
  text-decoration: none;
}

footer {
  color: gray;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- OPENING -->
<div id="opening">
  <h2>Undangan Digital</h2>
  <p>Kepada Yth: Bapak/Ibu/Saudara/i</p>
  <button class="open-btn" onclick="openInvite()">Buka Undangan</button>
</div>

<!-- MAIN -->
<div id="main">

<div class="hero">
  <h1>lala & [Nama Pasangan]</h1>
  <p>Dengan penuh kebahagiaan mengundang Anda</p>
</div>

<div class="section">
  <h2>📅 Acara</h2>
  <div class="card">
    Sabtu, 20 Juli 2026<br>
    10.00 WIB - Selesai
  </div>
</div>

<div class="section">
  <h2>📍 Lokasi</h2>
  <div class="card">
    Gedung Serbaguna Ranah<br><br>
    <a class="btn" href="https://maps.google.com">Lihat Maps</a>
  </div>
</div>

<div class="section">
  <h2>⏳ Countdown</h2>
  <div id="countdown"></div>
</div>

<div class="section">
  <h2>💌 RSVP</h2>
  <div class="card">
    <a class="btn" href="https://wa.me/628xxxxxxxxxx">Konfirmasi via WA</a>
  </div>
</div>

<footer>
Terima kasih atas kehadirannya ❤️
</footer>

</div>

<!-- MUSIC -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>

/* OPENING FUNCTION */
function openInvite() {
  document.getElementById("opening").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("music").play();
}

/* COUNTDOWN */
const targetDate = new Date("July 20, 2026 10:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const distance = targetDate - now;

  const days = Math.floor(distance / (1000*60*60*24));
  const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
  const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

  document.getElementById("countdown").innerHTML =
    days + " Hari " + hours + " Jam " + minutes + " Menit";
}, 1000);

</script>

</body>
</html>
